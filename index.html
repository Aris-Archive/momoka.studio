<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Momoka Studio</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body class="main">
  <div class="page">

    <div class="profile center">
      <img src="./img/momoka.jpg" class="radius_profile" alt="Momoka">
      <p id="nickname">Momoka Studio</p>
    </div>

    <div class="links center">

      <a class="b1" href="mailto:momoka@momoka.studio">
        <div class="div_icon div_profile">
          <img src="img/icon-envelope.png" class="icon" alt="">
        </div>
        <div class="div_username div_profile">
          <ul class="username">
            <li><b>Mail</b></li>
            <li>momoka@momoka.studio</li>
          </ul>
        </div>
      </a>
      <a class="b1" href="https://x.com/momoka_studio" target="_blank" rel="noopener">
        <div class="div_icon div_profile">
          <img src="img/icon-twitter.png" class="icon" alt="">
        </div>
        <div class="div_username div_profile">
          <ul class="username">
            <li><b>Twitter</b></li>
            <li>@momoka_studio</li>
          </ul>
        </div>
      </a>

    </div>

    <p class="footer">© 2026 Momoka Studio</p>

  </div>
</body>
</html>
